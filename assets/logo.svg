<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#24283b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="160" rx="16" fill="url(#bg)"/>

  <!-- Terminal window dots -->
  <circle cx="28" cy="24" r="6" fill="#f7768e"/>
  <circle cx="48" cy="24" r="6" fill="#e0af68"/>
  <circle cx="68" cy="24" r="6" fill="#9ece6a"/>

  <!-- Markdown icon: stylized # symbol -->
  <g transform="translate(40, 56)">
    <!-- Hash/heading symbol representing markdown -->
    <rect x="18" y="0" width="8" height="72" rx="4" fill="url(#accent)" transform="rotate(12, 22, 36)"/>
    <rect x="46" y="0" width="8" height="72" rx="4" fill="url(#accent)" transform="rotate(12, 50, 36)"/>
    <rect x="4" y="16" width="64" height="8" rx="4" fill="url(#accent)"/>
    <rect x="4" y="44" width="64" height="8" rx="4" fill="url(#accent)"/>
  </g>

  <!-- "mdw" text -->
  <text x="160" y="108" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace" font-size="64" font-weight="700" fill="#c0caf5" letter-spacing="-2">mdw</text>

  <!-- Tagline -->
  <text x="162" y="134" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace" font-size="14" fill="#565f89">markdown viewer for the terminal</text>

  <!-- Cursor blink -->
  <rect x="388" y="76" width="3" height="36" rx="1" fill="#7aa2f7">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
